version: 2

models:
  - name: fct_daily_returns
    description: >
      Core fact table. One row per ticker per trading day.
      Adds daily_return_pct and cumulative_return_pct via window functions.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - ticker
            - trade_date

    columns:
      - name: ticker
        tests:
          - not_null
      - name: trade_date
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: company_name
        tests:
          - not_null
      - name: sector
        tests:
          - not_null
